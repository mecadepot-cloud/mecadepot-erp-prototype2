// Helper: calculate effective price for a product and customer group
function effectivePrice(prod, grp) {
  const grid = PRICING_GRIDS[grp] || PRICING_GRIDS.Standard;
  const catDisc = grid.cats[prod.cat] || 0;
  const brandDisc = grid.brands[prod.br] || 0;
  const disc = Math.max(catDisc, brandDisc); // take best discount for customer
  return {price: prod.buy * grid.baseCoef * (1 - disc/100), disc, catDisc, brandDisc, coef: grid.baseCoef};
}

function approveDisc(id){
  const d=DISCOUNTS.find(x=>x.id===id);if(!d)return;
  if((ROLE==='ADMIN'||ROLE==='MANAGER')&&d.pct>15){
    toast('Remise >15% — seul le OWNER peut approuver','error');return;
  }
  DISCOUNTS=DISCOUNTS.map(x=>x.id===id?{...x,status:'APPROVED',approver:ROLES[ROLE].n}:x);
  toast('Remise approuvée — Audit log créé');screenDashboard();
}
function rejectDisc(id){DISCOUNTS=DISCOUNTS.map(d=>d.id===id?{...d,status:'REJECTED'}:d);toast('Remise refusée','warning');screenDashboard();}

  ${!isB2B?`<button class="btn bp" onclick="navigate('/pos/sale')">⚡ Nouvelle Vente</button>`:''}
  </div>
  <div class="tabs mb2" id="search-mode-tabs">
    <button class="tab on" onclick="setCatMode('text',this)">🔤 Texte libre</button>
    <button class="tab" onclick="setCatMode('oem',this)">🔩 Réf OEM</button>
    <button class="tab" onclick="setCatMode('ean',this)">📊 EAN/Barcode</button>
    <button class="tab" onclick="setCatMode('sku',this)">🏷 SKU interne</button>
    <button class="tab" onclick="setCatMode('xref',this)">🔀 Cross-ref</button>
  </div>
  <div class="mb2"><input class="fi" id="csrch" placeholder="🔍  Rechercher..." oninput="catFilter()" style="font-size:13px;padding:10px 14px" autofocus></div>

    <thead><tr><th>Produit</th><th>Réf OEM / EAN</th><th>Emplacement</th>${isB2B?'<th>Votre prix TTC</th>':'<th>HT</th><th>TTC</th><th>Stock</th>'}${!isB2B?'<th>Fourn.</th>':''}<th></th></tr></thead>
    <tbody id="ctbody"></tbody>
  </table></div>`);
  window._catMode='text';
  catFilter();
}
function setCatMode(m,el){
  window._catMode=m;
  document.querySelectorAll('#search-mode-tabs .tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const ph={text:'🔍 Nom, marque, description...',oem:'🔍 Référence OEM ex: 0986494524',ean:'🔍 Code EAN / scanner barcode',sku:'🔍 SKU interne ex: BRK-BOS-001',xref:'🔍 Référence croisée concurrent'};
  const el2=Q('csrch');if(el2){el2.placeholder=ph[m]||'';el2.value='';el2.focus();}
  catFilter();
}
function catFilter(){
  const q=(Q('csrch')||{value:''}).value.toLowerCase().trim();
  const mode=window._catMode||'text';
  const el=Q('ctbody');if(!el)return;
  const isB2B=ROLE&&ROLE.startsWith('B2B');
  const showCost=(ROLE==='OWNER'||ROLE==='MANAGER'||ROLE==='PURCHASER');
  const rows=PRODS.filter(p=>{
    if(!p.active)return false;
    if(!q)return true;
    if(mode==='ean')return p.ean.includes(q);
    if(mode==='sku')return p.sku.toLowerCase().includes(q);
    if(mode==='oem')return(p.ref||'').toLowerCase().includes(q);

function getCutoffCountdown(timeStr){
  const [h,m]=timeStr.split(':').map(Number);
  const now=new Date();
  const cut=new Date(now);cut.setHours(h,m,0,0);
  const diff=cut-now;
  if(diff<=0)return{label:'Dépassé',urgent:true,passed:true};
  const hd=Math.floor(diff/3600000),md=Math.floor((diff%3600000)/60000);
  return{label:`${hd}h${String(md).padStart(2,'0')}`,urgent:diff<3600000,passed:false};
}

// Calculate expected delivery date given lead days and cut-off time
function getDeliveryDate(lead, cutStr){
  if(!lead)return null;
  const ct=getCutoffCountdown(cutStr);
  // If cut-off passed today, add 1 extra day
  const extra=ct.passed?1:0;
  const totalDays=lead+extra;
  const d=new Date();
  d.setDate(d.getDate()+totalDays);
  // Skip weekends
  while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const label=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
  const tag=totalDays===1?'D+1':totalDays===2?'D+2':totalDays===3?'D+3':`D+${totalDays}`;
  return{label,tag,days:totalDays};
}

function supMeta(name){
  const cuts={'Autodistribution':'16:00','Distrigo (PSA)':'15:30','IDLP':'17:00','Nexus Auto':'14:00','Alliance Automotive':'16:30'};
  return cuts[name]||'16:00';
}

function calcOpening(){

  let total=0;
  inputs.forEach(i=>{total+=parseInt(i.value||0)*parseFloat(i.dataset.val);});
  const el=Q('pos-opening');if(el)el.value=total.toFixed(2);
}
function openCaisse(){
  const bal=parseFloat((Q('pos-opening')||{value:200}).value)||200;
  POS_SESSION={id:'sess'+Date.now(),status:'OPEN',opening:bal,cashier:ROLES[ROLE].n,date:new Date().toLocaleDateString('fr-FR'),openTime:new Date().toTimeString().slice(0,5),cash:0,card:0,check:0};
  toast(`✅ Caisse ouverte — Fond: ${fmt(bal)}`);
  navigate('/pos/sale');
}

let POS_SMODE='text';
function setSmode(mode,el){
  POS_SMODE=mode;
  document.querySelectorAll('.tab[id^=smode]').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const pq=Q('posq');
  if(pq){pq.placeholder=posPlaceholder(mode);pq.value='';pq.focus();}
  const pr=Q('posres');if(pr)pr.innerHTML='<div class="muted f12">Tapez pour chercher...</div>';
}
function posPlaceholder(m){
  return{text:'🔍 Nom, marque, description...',oem:'🔍 Référence OEM ex: 0986494524',ean:'🔍 Code EAN ex: 4047024743234',sku:'🔍 SKU interne ex: BRK-BOS-001',xref:'🔍 Référence croisée concurrente'}[m];
}
function posFilter(){
  const q=(Q('posq')||{value:''}).value.toLowerCase().trim();
  const el=Q('posres');if(!el)return;
  if(!q){el.innerHTML='<div class="muted f12">Tapez pour chercher...</div>';return;}
  let rows=PRODS.filter(p=>{
    if(!p.active)return false;
    if(POS_SMODE==='ean')return p.ean.startsWith(q)||p.ean===q;
    if(POS_SMODE==='sku')return p.sku.toLowerCase().includes(q);
    if(POS_SMODE==='oem')return(p.ref||'').toLowerCase().includes(q);
    if(POS_SMODE==='xref')return(p.ref||'').toLowerCase().includes(q)||p.sku.toLowerCase().includes(q);
    return p.n.toLowerCase().includes(q)||p.br.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
  }).slice(0,10);
  el.innerHTML=rows.map(p=>{
    const supA=SUP_AVAIL[p.id]||[];
    const bestSup=supA.find(s=>s.qty>0);
    const isExt=p.stk===0;
    const dd=isExt&&bestSup?getDeliveryDate(bestSup.lead,bestSup.cut):null;
    const ct=bestSup?getCutoffCountdown(bestSup.cut):null;
    const dCol=dd?({1:'#2E7D32',2:'#E65100',3:'#7B1FA2'}[dd.days]||'#555'):'#C62828';
    return `<div onclick="addToCart('${p.id}')" style="padding:8px 9px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;background:#F5F5FA" onmouseover="this.style.borderColor='#1565C0';this.style.background='#EFF6FF'" onmouseout="this.style.borderColor='transparent';this.style.background='#F5F5FA'">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="f7 f13">${p.em} ${p.n}</div>
          <div class="muted f11 mono">${p.sku}${p.ref?' · '+p.ref:''}</div>
          ${isExt?`<div style="margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${dd?`<span style="font-size:11px;font-weight:800;background:${dCol}15;border:1px solid ${dCol}50;border-radius:5px;padding:1px 6px;color:${dCol}">${dd.tag} — ${dd.label}</span>`:''}
            ${bestSup?`<span style="font-size:10px;color:#888">${bestSup.sup} · ${bestSup.qty}u · ${fmt(bestSup.price)}${ct&&!ct.passed?' · ⏱'+ct.label:ct&&ct.passed?' · ⚠️ cut-off dépassé':''}</span>`:'<span style="font-size:10px;color:#C62828">⛔ Aucun fournisseur</span>'}
          </div>`:`<div style="font-size:11px;color:#2E7D32;margin-top:2px">🟢 Stock: ${p.stk} u en entrepôt</div>`}
          ${p.dep>0?`<div style="font-size:10px;color:#7B1FA2;margin-top:1px">⚙️ Consigne: +${fmt(p.dep)} HT</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="f8 f13">${fmt(p.buy*p.cof*1.2)}</div>
          <div style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-top:2px;background:${isExt?'#FFF3E0':'#E8F5E9'};color:${isExt?'#E65100':'#2E7D32'}">${isExt?'EXT':'INT'}</div>
        </div>
      </div>
    </div>`;
  }).join('')||'<div class="muted f12">Aucun résultat</div>';
}
function quickCatalogRows(cat){
  return PRODS.filter(p=>p.active&&(!cat||p.cat===cat)).slice(0,16).map(p=>{
    const isExt=p.stk===0;
    const best=getBestSup(p.id);
    const dd=isExt&&best?getDeliveryDate(best.lead,best.cut):null;
    const dCol=dd?({1:'#2E7D32',2:'#E65100',3:'#7B1FA2'}[dd.days]||'#555'):'#C62828';
    return `<div onclick="addToCart('${p.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:6px 7px;border-radius:7px;cursor:pointer;margin-bottom:2px" onmouseover="this.style.background='#F0F7FF'" onmouseout="this.style.background=''">
      <div style="flex:1;min-width:0">
        <div class="f7 f12">${p.em} ${ell(p.n,22)}</div>
        <div class="muted f11 mono">${p.sku}</div>
        ${isExt&&dd?`<div style="font-size:10px;font-weight:700;color:${dCol}">${dd.tag} ${best.sup}</div>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:6px">
        <div class="f7 f12">${fmt(p.buy*p.cof*1.2)}</div>
        <div class="f11" style="color:${isExt?dCol:'#2E7D32'}">${isExt?(dd?dd.tag:'⛔'):p.stk+'u'}</div>
      </div>
    </div>`;
  }).join('')||'<div class="muted f12">Aucun produit</div>';
}
function posCatFilter(cat){const el=Q('quickcat');if(el)el.innerHTML=quickCatalogRows(cat);}

function renderCartLines(){
  if(!CART.length)return`<div class="es" style="padding:24px 0"><div style="font-size:36px">🛒</div><div class="muted f12 m1">Panier vide · Recherchez ou cliquez sur un produit</div></div>`;
  const showMargin=(ROLE==='OWNER'||ROLE==='MANAGER');
  return CART.map(c=>{
    const netU=c.uht*(1-c.disc/100);
    const lineHT=netU*c.qty;
    const supA=c.supAvail||[];
    const bestSup=supA.find(s=>s.qty>0);
    const marginPct=c.buy>0?((netU-c.buy)/netU*100):0;
    const isExt=c.src==='EXT'||c.stk===0;
    const dd=isExt&&bestSup?getDeliveryDate(bestSup.lead,bestSup.cut):null;
    const ct=isExt&&bestSup?getCutoffCountdown(bestSup.cut):null;
    const dCol=dd?{1:'#2E7D32',2:'#E65100',3:'#7B1FA2'}[dd.days]||'#555':'#C62828';
    return `<div style="padding:8px 6px;border-bottom:1px solid #F0F0F4;${c.disc>0?'background:#FFFBF0;border-radius:6px;margin-bottom:2px':''}">
      <div style="display:flex;align-items:start;gap:7px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="f7 f13">${c.em} ${ell(c.n,24)}</span>
            <span class="bdg" style="background:${isExt?'#FFF3E0':'#E8F5E9'};color:${isExt?'#E65100':'#2E7D32'};font-size:10px">${isExt?'EXT':'INT'}</span>
            ${c.dep>0?`<span class="bdg" style="background:#F3E5F5;color:#7B1FA2;font-size:10px">+consigne</span>`:''}
            ${isExt&&dd?`<span style="background:${dCol}15;border:1px solid ${dCol}40;border-radius:5px;padding:1px 6px;font-size:10px;font-weight:800;color:${dCol}">${dd.tag} — ${dd.label}</span>`:''}
            ${isExt&&!bestSup?`<span style="background:#FEF2F2;border:1px solid #FFCDD2;border-radius:5px;padding:1px 6px;font-size:10px;color:#C62828">⛔ Aucun stock fourn.</span>`:''}
          </div>
          <div class="muted f11 mono" style="margin-top:1px">${c.sku}${bestSup?' · '+bestSup.sup:''}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
            ${c._priceEdited&&c._origUht?`<span style="font-size:11px;text-decoration:line-through;color:#bbb">${fmt(c._origUht)}</span>`:''}<span class="f12" style="color:${c._priceEdited?'#7B1FA2':'#555'};font-weight:${c._priceEdited?'700':'400'}">${fmt(c.uht)} HT</span>
            <span class="f12" style="color:#888">${fmt(c.uht*1.2)} TTC</span>
            ${c.disc>0?`<span style="color:#E65100;font-size:11px;font-weight:700">-${c.disc}%</span><span class="f7 f12" style="color:#E65100">${fmt(netU)} HT</span><span class="f12" style="color:#E65100;opacity:.7">${fmt(netU*1.2)} TTC</span>`:''}
            ${c._grp&&c._grp!=='Standard'?`<span style="font-size:9px;background:#E8F5E9;color:#2E7D32;padding:1px 5px;border-radius:8px">grille ${c._grp}</span>`:''}
            ${showMargin?`<span style="font-size:10px;background:${c._priceEdited?'#7B1FA2':'#F3E5F5'};color:${c._priceEdited?'#fff':'#7B1FA2'};padding:1px 5px;border-radius:4px;cursor:${(ROLE==='OWNER'||ROLE==='MANAGER')?'pointer':'default'}" ${(ROLE==='OWNER'||ROLE==='MANAGER')?`onclick="lineEditPrice('${c.id}')"`:''}>${c._priceEdited?'✏️ ':''}marge ${marginPct.toFixed(0)}%</span>`:''}
            ${isExt&&ct&&!ct.passed?`<span style="font-size:10px;color:${ct.urgent?'#C62828':'#888'}">⏱ cut-off ${bestSup.cut} (${ct.label})</span>`:''}
            ${isExt&&ct&&ct.passed?`<span style="font-size:10px;color:#C62828;font-weight:700">⚠️ Cut-off dépassé → +1j</span>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
          <button class="btn bg" style="width:24px;height:24px;padding:0;font-size:14px;border-radius:5px" onclick="cqty('${c.id}',-1)">−</button>
          <input type="number" value="${c.qty}" min="1" style="width:40px;text-align:center;padding:3px;border:1px solid #E0E0E6;border-radius:5px;font-size:13px;font-weight:700" onchange="setQty('${c.id}',this.value)">
          <button class="btn bg" style="width:24px;height:24px;padding:0;font-size:14px;border-radius:5px" onclick="cqty('${c.id}',1)">+</button>

        <div style="width:82px;text-align:right;flex-shrink:0">
          <div class="f7 f12">${fmt(lineHT)}</div>

          ${ROLE!=='B2B_VIEWER'?`<button class="btn bg bsm" style="padding:2px 5px;font-size:10px" onclick="lineDisc('${c.id}')">%</button>`:''}

        </div>
      </div>
    </div>`;
  }).join('');
}

function renderCartTotals(){
  if(!CART.length)return'';
  const totHT=CART.reduce((s,c)=>s+c.uht*(1-c.disc/100)*c.qty,0);
  const totDep=CART.reduce((s,c)=>s+(c.dep||0)*c.qty,0);
  const discAmt=POS_DISC>0?totHT*POS_DISC/100:0;
  const netHT=totHT-discAmt;
  const tva=netHT*0.2;
  const ttc=netHT*1.2;
  const grand=ttc+totDep*1.2;
  const showMargin=(ROLE==='OWNER'||ROLE==='MANAGER');
  const avgMargin=showMargin&&totHT>0?CART.reduce((s,c)=>s+((c.uht*(1-c.disc/100)-c.buy)/Math.max(c.uht*(1-c.disc/100),1)*c.qty),0)/CART.reduce((s,c)=>s+c.qty,0)*100:0;
  return`<div style="font-size:12px;color:#888">
    <div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>Sous-total HT</span><span>${fmt(totHT)}</span></div>
    ${POS_DISC>0?`<div style="display:flex;justify-content:space-between;margin-bottom:2px;color:#E65100;font-weight:600"><span>Remise globale ${POS_DISC}%</span><span>-${fmt(discAmt)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>Net HT</span><span>${fmt(netHT)}</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>TVA 20%</span><span>${fmt(tva)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:900;color:#1A1A2E;padding-top:6px;border-top:1px solid #E8E8EC">
      <span>TOTAL TTC</span><span>${fmt(ttc)}</span>
    </div>
    ${totDep>0?`<div style="display:flex;justify-content:space-between;font-size:11px;color:#7B1FA2;margin-top:3px"><span>dont consignes TTC</span><span>+${fmt(totDep*1.2)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#7B1FA2"><span>TOTAL + CONSIGNES</span><span>${fmt(grand)}</span></div>`:''}
    ${showMargin?`<div style="background:#F3E5F5;padding:6px 8px;border-radius:5px;margin-top:3px">
      <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7B1FA2">Marge moy.</span><span style="color:#7B1FA2;font-weight:700">${avgMargin.toFixed(1)}%</span></div>

function refreshPOS(){
  const cl=Q('cart-lines'),ct=Q('cart-totals'),pp=Q('pay-panel');
  if(cl)cl.innerHTML=renderCartLines();
  if(ct)ct.innerHTML=renderCartTotals();
  if(pp)refreshPayPanel();
  // update delivery mode button states
  ['COMPLETE','PARTIAL'].forEach(m=>{
    document.querySelectorAll(`button`).forEach(b=>{if(b.textContent.includes(m==='COMPLETE'?'Complet':'Partiel')){b.className='btn '+(POS_DELIVERY===m?'bp':'bs')+' '+b.className.split(' ').slice(2).join(' ');}});
  });
}
function refreshPayPanel(){
  const el=Q('pay-panel');if(!el)return;
  const isB2B=ROLE&&ROLE.startsWith('B2B');
  const totHT=CART.reduce((s,c)=>s+c.uht*(1-c.disc/100)*c.qty,0);
  const ttc=(totHT*(1-POS_DISC/100))*1.2;
  if(!CART.length){
    el.innerHTML=`<div class="es" style="padding:40px 10px"><div style="font-size:32px">💳</div><div class="m2 muted f12">Ajoutez des produits</div></div>`;return;
  }
  const cust=CUSTOMERS.find(c=>c.n===POS_CUST);
  const creditExceeded=isB2B&&cust&&(cust.bal+ttc)>cust.lim;
  el.innerHTML=`
    <div class="muted f11 f7 mb2">ENCAISSEMENT</div>
    <div style="background:#1565C0;border-radius:10px;padding:12px;color:#fff;text-align:center;margin-bottom:10px">

    </div>
    ${creditExceeded?`<div style="background:#FEF2F2;border:1px solid #FFCDD2;border-radius:8px;padding:8px;font-size:11px;color:#C62828;margin-bottom:8px;font-weight:600">⚠️ Plafond crédit dépassé — approbation requise<br><span style="font-weight:400">Solde: ${fmt(cust.bal)} / Plafond: ${fmt(cust.lim)}</span></div>`:''}
    ${isB2B?`<div style="display:flex;flex-direction:column;gap:7px">
      <button class="btn" style="background:${creditExceeded?'#7B1FA2':'#2E7D32'};color:#fff;padding:11px;font-size:13px;font-weight:700;border-radius:10px" onclick="${creditExceeded?'confirmCreditOrder()':'finaliserVente(\'credit\','+ttc+')'}">
        ${creditExceeded?'📋 Soumettre pour approbation':'✓ Commander sur crédit'}

      <button class="btn" style="background:#E65100;color:#fff;padding:11px;font-size:13px;font-weight:700;border-radius:10px" onclick="encaisserMode('mixte',${ttc})">⚡ Mixte</button>

  const origHT=c._origUht||curHT;
  openM(`💰 Édition Prix — ${ell(c.n,30)}`,`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="background:#F5F5FA;border-radius:8px;padding:10px;text-align:center">

    </div>
    <div style="background:#F5F5FA;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:#888;margin-bottom:3px">Prix catalogue HT</div>
      <div style="font-size:18px;font-weight:900;color:#888">${fmt(origHT)}</div>

    <div style="font-size:11px;font-weight:700;color:#1565C0;margin-bottom:10px">✏️ MODIFIER LE PRIX DE VENTE</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <label class="fl">Prix vente HT (€)</label>

      </div>
      <div>
        <label class="fl">Prix vente TTC (€)</label>
        <input class="fi" id="ep-ttc" type="number" step="0.01" min="0" value="${curTTC.toFixed(2)}" oninput="epCalcFromTTC('${id}')" style="font-size:16px;font-weight:700;padding:10px;text-align:center">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

        <label class="fl">Marge cible (%)</label>

      </div>
      <div>
        <label class="fl">Coefficient</label>
        <input class="fi" id="ep-coeff" type="number" step="0.01" min="0" value="${curCoeff.toFixed(3)}" oninput="epCalcFromCoeff('${id}')" style="font-size:16px;font-weight:700;padding:10px;text-align:center;color:#E65100">
      </div>
    </div>
  </div>

  ${curHT!==origHT?`<div style="background:#FFF3E0;border-radius:8px;padding:7px 10px;font-size:11px;color:#E65100;margin-bottom:10px">⚠️ Prix actuel différent du catalogue (${fmt(origHT)} → ${fmt(curHT)})</div>`:''}

    <button class="btn bp" onclick="epApplyPrice('${id}')">✓ Appliquer</button>
  </div>`,460);
}
function epPreviewHTML(ht,buy,qty,disc){
  const netU=ht*(1-disc/100);
  const lineHT=netU*qty;
  const lineTTC=lineHT*1.2;
  const marginU=buy>0?((netU-buy)/netU*100):0;
  const marginAbs=(netU-buy)*qty;
  const isNeg=marginU<0;
  const isLow=marginU>=0&&marginU<10;
  const col=isNeg?'#C62828':isLow?'#E65100':'#2E7D32';
  return `<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px">
    <div><span style="color:#888">Ligne HT:</span> <b>${fmt(lineHT)}</b></div>
    <div><span style="color:#888">Ligne TTC:</span> <b>${fmt(lineTTC)}</b></div>
    <div><span style="color:#888">Marge €:</span> <b style="color:${col}">${marginAbs>=0?'+':''}${fmt(marginAbs)}</b></div>
    <div><span style="color:#888">Marge %:</span> <b style="color:${col}">${marginU.toFixed(1)}%</b> ${isNeg?'<span style="color:#C62828;font-weight:800">⚠️ VENTE À PERTE</span>':isLow?'<span style="color:#E65100">⚠ Marge faible</span>':''}</div>
  </div>`;
}
function _epBuy(id){const c=CART.find(x=>x.id===id);return c?c.buy||0:0;}
function _epQty(id){const c=CART.find(x=>x.id===id);return c?c.qty:1;}
function _epDisc(id){const c=CART.find(x=>x.id===id);return c?c.disc||0:0;}
function epCalcFromHT(id){
  const ht=parseFloat(Q('ep-ht').value)||0;
  const buy=_epBuy(id);
  Q('ep-ttc').value=(ht*1.2).toFixed(2);
  Q('ep-margin').value=(buy>0?((ht-buy)/ht*100):0).toFixed(1);
  Q('ep-coeff').value=(buy>0?(ht/buy):1).toFixed(3);
  Q('ep-preview').innerHTML=epPreviewHTML(ht,buy,_epQty(id),_epDisc(id));
}
function epCalcFromTTC(id){
  const ttc=parseFloat(Q('ep-ttc').value)||0;
  const ht=ttc/1.2;
  const buy=_epBuy(id);
  Q('ep-ht').value=ht.toFixed(2);

// ─── Web Audio API — scan feedback (spec §5537) ──────────────
function beep(freq=800, dur=100, type='square'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur/1000);
  }catch(e){}
}
function beepOK(){beep(800,100);}      // scan réussi
function beepError(){beep(300,200);}   // erreur
function beepWrong(){beep(300,500);if(navigator.vibrate)navigator.vibrate([200,100,200]);} // mauvais produit

function ncPreviewGrid(grp){
  const grid=PRICING_GRIDS[grp];if(!grid)return;
  const preview=Q('nc-grid-preview');const catsEl=Q('nc-grid-cats');
  if(!preview||!catsEl)return;
  const cols={Gold:'#FFF8E1|#F57F17',Silver:'#F5F5F5|#757575',Bronze:'#FBE9E7|#BF360C',Standard:'#F5F5FA|#555'};
  const [bg,c]=(cols[grp]||'#F5F5FA|#555').split('|');
  preview.querySelector('div').textContent=`APERÇU REMISES PAR CATÉGORIE (grille ${grp} — coeff ×${grid.baseCoef})`;
  catsEl.innerHTML=Object.entries(grid.cats).map(([cat,disc])=>`<span style="background:${bg};color:${c};padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600">${cat}: ${disc>0?'-'+disc+'%':'—'}</span>`).join('');
  // auto-set payment terms
  const pay=Q('nc-payment');
  if(pay&&grid.paymentTerms){
    for(let i=0;i<pay.options.length;i++){if(pay.options[i].value===grid.paymentTerms||pay.options[i].value.startsWith(grid.paymentTerms.replace('j net',''))){pay.selectedIndex=i;break;}}
  }
  const note=Q('nc-payment-note');
  if(note)note.textContent=`Défaut ${grp}: ${grid.paymentTerms}`;
}

      <td class="muted f11">${d.date}</td>
      <td>${d.status==='PENDING_APPROVAL'?`
        <button class="btn bp bsm" onclick="appDisc('${d.id}')">✓ Approuver</button>
        <button class="btn bd bsm" onclick="rejDisc('${d.id}')">✕</button>`:
        d.approver?`<span class="muted f11">par ${d.approver}</span>`:''}
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`);

function appDisc(id){
  const d=DISCOUNTS.find(x=>x.id===id);if(!d)return;
  // OWNER = approve any %. ADMIN/MANAGER = max 15%. Spec invariant.
  if((ROLE==='ADMIN'||ROLE==='MANAGER')&&d.pct>15){
    toast('Remise >15% — seul le OWNER peut approuver','error');return;
  }
  DISCOUNTS=DISCOUNTS.map(x=>x.id===id?{...x,status:'APPROVED',approver:ROLES[ROLE].n}:x);
  toast('Remise approuvée — Audit log créé');screenDiscounts();
}
function rejDisc(id){DISCOUNTS=DISCOUNTS.map(d=>d.id===id?{...d,status:'REJECTED'}:d);toast('Remise refusée','warning');screenDiscounts();}

function screenComparison(){
  // Multi-product basket: all EXT products with CRITICAL/HIGH alerts
  const toOrder=PRODS.filter(p=>p.active&&p.stk===0&&SUP_AVAIL[p.id]);
  const suppliers=['Autodistribution','Distrigo (PSA)','IDLP','Nexus Auto','Alliance Automotive'];
  const supMeta={
    'Autodistribution':{rel:94,api:true,cut:'16:00'},
    'Distrigo (PSA)':{rel:91,api:true,cut:'15:30'},
    'IDLP':{rel:88,api:true,cut:'17:00'},
    'Nexus Auto':{rel:85,api:false,cut:'14:00'},
    'Alliance Automotive':{rel:90,api:false,cut:'16:30'},
  };
  setContent(`
  <div class="ph"><div><div class="ptit">Comparaison Fournisseurs</div><div class="psub">Screen 46 — ${toOrder.length} produits · 5 fournisseurs · timeout 3s</div></div>
  <button class="btn bp bsm" onclick="toast('Analyse en cours... ⏱','info')">▶ Lancer comparaison</button></div>
  <div style="background:#E8F5E9;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px">
    💡 Vert = meilleur prix disponible · D+1 = livraison demain · D+2 = après-demain · D+3 = J+3
  </div>
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:#F5F5FA">
        <th style="padding:8px;text-align:left;min-width:180px">Produit</th>
        ${suppliers.map(s=>{
          const m=supMeta[s];
          const ct=getCutoffCountdown(m.cut);
          return `<th style="padding:8px;text-align:center;min-width:130px">
            <div class="f7">${s}</div>
            <div style="font-size:10px;color:#888">${m.api?'🔌 API':'📋 Manuel'} · Fiab. ${m.rel}%</div>
            <div style="font-size:10px;color:${ct.urgent?'#C62828':'#888'}">cut-off ${m.cut} (${ct.label})</div>
          </th>`;
        }).join('')}
      </tr>
    </thead>
    <tbody>
      ${toOrder.slice(0,10).map(p=>{
        const sa=SUP_AVAIL[p.id]||[];
        const prices=sa.filter(s=>s.qty>0).map(s=>s.price);
        const minPrice=prices.length?Math.min(...prices):null;
        return `<tr style="border-bottom:1px solid #F0F0F4">
          <td style="padding:8px">
            <div class="f7">${p.em} ${ell(p.n,22)}</div>
            <div class="muted mono f11">${p.sku}</div>
            ${p.dep>0?`<div style="color:#7B1FA2;font-size:10px">⚙️ consigne ${fmt(p.dep)}</div>`:''}
          </td>
          ${suppliers.map(sup=>{
            const entry=sa.find(s=>s.sup===sup);
            if(!entry||!entry.qty) return `<td style="padding:8px;text-align:center;background:#FEF2F2;color:#C62828;font-size:11px">⛔</td>`;
            const dd=getDeliveryDate(entry.lead,entry.cut);
            const dCol={1:'#2E7D32',2:'#E65100',3:'#7B1FA2'}[entry.lead]||'#555';
            const isBest=entry.price===minPrice;
            return `<td style="padding:8px;text-align:center;background:${isBest?'#E8F5E9':'#FAFAFA'};border-left:1px solid #F0F0F4">
              <div class="f7" style="color:${isBest?'#2E7D32':'#1A1A2E'}">${fmt(entry.price)}${isBest?' ✓':''}</div>
              <div style="font-size:10px;color:#888">${entry.qty}u dispo</div>
              <div style="font-weight:700;font-size:11px;color:${dCol}">${dd?dd.tag:'?'}</div>
              <button class="btn bp" style="padding:2px 8px;font-size:10px;margin-top:3px" onclick="createPO('${sup}','${p.id}')">Cmd</button>
            </td>`;
          }).join('')}
        </tr>`;
      }).join('')}
    </tbody>
  </table>
  </div>
  <div style="margin-top:12px;display:flex;gap:8px">
    <button class="btn bp" onclick="toast('Bons de commande groupés créés · '+toOrder.length+' produits')">✓ Créer BdC groupés (${toOrder.length} produits)</button>
    <button class="btn bs" onclick="toast('Export comparatif généré')">📥 Export Excel</button>
  </div>`);
}
function createPO(sup){
  const num='PO-2026-'+String(Math.floor(Math.random()*99999)).padStart(5,'0');
  SUP_ORDERS=[{id:'so'+Date.now(),num,sup,status:'PENDING',total:85,lines:1,date:'28/02'},...SUP_ORDERS];
  toast(`${num} créé — ${sup}`);navigate('/supplier-orders');
}

function loadBdC(){
  const v=(Q('scan-in')||{value:''}).value.trim();
  const fb=Q('scan-feedback');
  if(!v)return;
  const found=SUP_ORDERS.find(o=>o.num===v||o.num.includes(v)||v.includes(o.num.slice(-5)));
  if(found&&found.status!=='RECEIVED'){
    beepOK();
    window._activeRecv=found.id;
    screenReception();
  } else if(found&&found.status==='RECEIVED'){
    beepError();
    if(fb)fb.innerHTML=`<span style="color:#E65100;font-weight:700">⚠️ ${found.num} déjà réceptionné</span>`;
  } else {
    beepError();
    if(fb)fb.innerHTML=`<span style="color:#C62828;font-weight:700">❌ BdC non trouvé: ${v}</span>`;
  }
  setTimeout(()=>{if(fb)fb.innerHTML='';},3000);
}

function validateLine(orderId,lineIdx){
  const o=SUP_ORDERS.find(x=>x.id===orderId);if(!o)return;
  const qtyEl=Q('rl-qty-'+lineIdx);
  const statusEl=Q('rl-status-'+lineIdx);
  const qty=qtyEl?parseInt(qtyEl.value)||0:(o.orderLines[lineIdx]||{}).qtyOrdered||0;
  const status=statusEl?statusEl.value:'OK';
  // Update stock
  const line=o.orderLines[lineIdx];
  if(line&&qty>0){PRODS=PRODS.map(pr=>pr.sku===line.sku?{...pr,stk:pr.stk+qty}:pr);}
  SUP_ORDERS=SUP_ORDERS.map(x=>{
    if(x.id!==orderId)return x;
    const newLines=x.orderLines.map((l,i)=>i===lineIdx?{...l,qtyReceived:qty,lineStatus:status}:l);
    return {...x,orderLines:newLines};
  });
  if(status==='OK'&&qty>=(line?.qtyOrdered||0)){beepOK();}else{beepError();}
  screenReception();
}
function finalizeReception(orderId){
  const o=SUP_ORDERS.find(x=>x.id===orderId);if(!o)return;
  const lines=o.orderLines||[];
  const pending=lines.filter(l=>l.qtyReceived===null);
  if(pending.length){
    toast(`${pending.length} ligne(s) non validée(s) — Validez toutes les lignes avant de terminer`,'warning');
    return;
  }
  const shortages=lines.filter(l=>l.qtyReceived<l.qtyOrdered);
  SUP_ORDERS=SUP_ORDERS.map(x=>x.id===orderId?{...x,status:'RECEIVED'}:x);
  window._activeRecv=null;
  beepOK();
  if(shortages.length){toast(`Réception partielle — ${shortages.length} manque(s) · Stock mis à jour`,'warning');}
  else{toast(`✅ BdC ${o.num} réceptionné — ${lines.length} lignes · Stock mis à jour`);}
  screenReception();
}

function runSim(){
  const cat=(Q('sim-cat')||{value:'Freinage'}).value;
  const brand=(Q('sim-brand')||{value:'Bosch'}).value;
  const buy=parseFloat((Q('sim-buy')||{value:'50'}).value)||50;
  const groups=['Gold','Silver','Bronze','Standard'];
  const grpMeta={Gold:{bg:'#FFF8E1',c:'#F57F17',icon:'🥇'},Silver:{bg:'#F5F5F5',c:'#757575',icon:'🥈'},Bronze:{bg:'#FBE9E7',c:'#BF360C',icon:'🥉'},Standard:{bg:'#F5F5FA',c:'#555',icon:'🏷️'}};
  const el=Q('sim-result');if(!el)return;
  el.innerHTML=`
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#F5F5FA">
      <th style="padding:8px;text-align:left">Groupe</th>
      <th style="padding:8px;text-align:center">Coeff.</th>
      <th style="padding:8px;text-align:center">Prix cat.</th>
      <th style="padding:8px;text-align:center">-Cat.</th>
      <th style="padding:8px;text-align:center">-Marque</th>
      <th style="padding:8px;text-align:center">Remise</th>
      <th style="padding:8px;text-align:right;font-weight:700">Prix client HT</th>
    </tr></thead>
    <tbody>
      ${groups.map(g=>{
        const grid=PRICING_GRIDS[g];
        const catD=grid.cats[cat]||0;
        const brandD=(grid.brands&&grid.brands[brand])||0;
        const disc=Math.max(catD,brandD);
        const priceCat=buy*grid.baseCoef;
        const priceFinal=priceCat*(1-disc/100);
        const margin=((priceFinal-buy)/priceFinal*100).toFixed(1);
        return `<tr style="border-bottom:1px solid #F0F0F4">
          <td style="padding:8px"><span style="background:${grpMeta[g].bg};color:${grpMeta[g].c};padding:2px 8px;border-radius:20px;font-weight:700;font-size:11px">${grpMeta[g].icon} ${g}</span></td>
          <td style="padding:8px;text-align:center;font-family:monospace">×${grid.baseCoef}</td>
          <td style="padding:8px;text-align:center;color:#888">${priceCat.toFixed(2)}€</td>
          <td style="padding:8px;text-align:center;color:${catD>0?'#1565C0':'#bbb'}">${catD>0?'-'+catD+'%':'—'}</td>
          <td style="padding:8px;text-align:center;color:${brandD>0?'#7B1FA2':'#bbb'}">${brandD>0?'-'+brandD+'%':'—'}</td>
          <td style="padding:8px;text-align:center;font-weight:700;color:${disc>=15?'#2E7D32':disc>=8?'#1565C0':disc>0?'#E65100':'#888'}">${disc>0?'-'+disc+'%':'—'}</td>
          <td style="padding:8px;text-align:right;font-weight:800;font-size:14px">${priceFinal.toFixed(2)} €
            <div style="font-size:10px;color:#888">Marge ${margin}%</div>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>
  <div style="background:#F5F5FA;border-radius:8px;padding:8px 12px;font-size:11px;color:#555;margin-top:10px">
    💡 La remise effective = <b>max(remise catégorie "${cat}", remise marque "${brand||'—'}")</b>
  </div>`;
}

          <div style="background:#E8F5E9;border-radius:7px;padding:8px;text-align:center;border:2px solid #2E7D32"><div style="font-size:18px">💰</div><div class="muted f11">Total TTC</div><div class="f7 succ">${fmt((sess?sess.cash||0:0)+(sess?sess.card||0:0)+(sess?sess.check||0:0))}</div></div>
        </div>
      </div>
      ${sess&&sess.status==='OPEN'?`<button class="btn bp" style="width:100%;padding:13px;font-size:14px" onclick="closePOS()">🔒 Valider la Clôture</button>`:''}
    </div>
    <div>
      <div class="card">
        <div class="muted f11 f7 mb2">HISTORIQUE CLÔTURES</div>
        ${POS_SESSIONS.map(s=>`<div style="padding:10px;background:#F5F5FA;border-radius:8px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div class="f7 f12">${s.date}</div><div class="muted f11">${s.cashier}</div></div>
            <div style="text-align:right">
              ${bdg(s.status)}
              <div class="f11 mt-0" style="color:${Math.abs(s.actual-s.expected)<5?'#2E7D32':'#C62828'}">Écart: ${s.actual>=s.expected?'+':''}${fmt(s.actual-s.expected)}</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:7px;font-size:11px;color:#888">
            <span>Espèces: ${fmt(s.cash)}</span>
            <span>·</span>
            <span>CB: ${fmt(s.card)}</span>
            <span>·</span>
            <span>Chèques: ${fmt(s.check)}</span>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`);
  calcVariance(expected);
}
function calcVariance(expected){
  const actual=parseFloat((Q('cai-count')||{value:expected}).value)||expected;
  const diff=actual-expected;
  const el=Q('variance-val');
  if(el){el.textContent=fmt(diff);el.style.color=Math.abs(diff)<5?'#2E7D32':'#C62828';}
}
function closePOS(){
  const expected=(POS_SESSION?POS_SESSION.opening:200)+(POS_SESSION?POS_SESSION.cash||0:0);
  const actual=parseFloat((Q('cai-count')||{value:expected}).value)||expected;
  const sess={
    id:'s'+Date.now(),
    date:new Date().toLocaleDateString('fr-FR'),
    cashier:ROLES[ROLE].n,
    opening:POS_SESSION?POS_SESSION.opening:200,
    expected,actual,
    cash:POS_SESSION?POS_SESSION.cash||0:0,
    card:POS_SESSION?POS_SESSION.card||0:0,
    check:POS_SESSION?POS_SESSION.check||0:0,
    status:'VALIDATED'
  };
  POS_SESSIONS=[sess,...POS_SESSIONS];
  POS_SESSION={...POS_SESSION,status:'CLOSED'};
  const diff=actual-expected;
  toast(`Caisse clôturée · Écart: ${diff>=0?'+':''}${fmt(diff)} · Rapport Z généré`);
  screenPosClose();
}

function addProductImage(pid){
  if(!PRODUCT_IMAGES[pid])PRODUCT_IMAGES[pid]=[];

  PRODUCT_IMAGES[pid].push('mock-image-'+Date.now());

function filterImgProds(q){
  const el=Q('img-prod-list');if(!el)return;

}

function readNotif(id,link){NOTIFICATIONS=NOTIFICATIONS.map(n=>n.id===id?{...n,read:true}:n);updateNotifBadge();if(link&&link!=='undefined')navigate(link);else screenNotifications();}
function deleteNotif(id){NOTIFICATIONS=NOTIFICATIONS.filter(n=>n.id!==id);screenNotifications();}
function markAllRead(){NOTIFICATIONS=NOTIFICATIONS.map(n=>({...n,read:true}));updateNotifBadge();toast('Tout marqué lu');screenNotifications();}
function clearNotifs(){NOTIFICATIONS=NOTIFICATIONS.filter(n=>!n.read);updateNotifBadge();toast('Notifications lues supprimées');screenNotifications();}
function filterNotifs(type,el){
  document.querySelectorAll('#notif-tabs .tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  const list=Q('notif-list');if(!list)return;
  list.querySelectorAll('[id^="notif-"]').forEach(d=>{
    const n=NOTIFICATIONS.find(x=>'notif-'+x.id===d.id);if(!n)return;
    d.style.display=(type==='all'||( type==='unread'&&!n.read)||(n.type===type))?'':'none';
  });
}

        <b>Pourquoi deux OCR distincts ?</b><br>
        <span style="color:#1565C0">▶ Cet écran (Screen 64)</span> : Magasinier → photo du <b>bon de livraison physique</b> → 
        extraction N° BL + quantités reçues → pré-remplit la fiche de réception.<br>
        <span style="color:#7B1FA2">▶ Screen 40</span> : Acheteur → upload <b>facture fournisseur</b> PDF → 
        extraction montants HT/TTC/TVA → rapprochement comptable BdC↔Facture.
      </div>
    </div>
  </div>

  <!-- Stepper visuel -->
  <div style="display:flex;align-items:center;gap:0;margin-bottom:20px;max-width:600px">
    ${[
      ['1','Choisir BdC','select'],
      ['2','Photographier','photo'],
      ['3','Vérifier OCR','verify'],
      ['4','Valider','done'],
    ].map(([n,l,s],i,arr)=>{
      const active=_state.step===s;
      const passed=['select','photo','verify','done'].indexOf(_state.step)>[...arr].findIndex(x=>x[2]===s);
      return `<div style="display:flex;align-items:center;flex:1">
        <div style="display:flex;flex-direction:column;align-items:center;flex:1">
          <div style="width:32px;height:32px;border-radius:50%;background:${passed?'#2E7D32':active?'#1565C0':'#E0E0E6'};color:${passed||active?'#fff':'#888'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${passed?'✓':n}</div>
          <div style="font-size:10px;color:${active?'#1565C0':'#888'};margin-top:3px;text-align:center">${l}</div>
        </div>
        ${i<arr.length-1?`<div style="height:2px;background:${passed?'#2E7D32':'#E0E0E6'};flex:0 0 30px;margin-bottom:16px"></div>`:''}
      </div>`;
    }).join('')}
  </div>

  ${_state.step==='select'?`
  <!-- Étape 1: Sélectionner le BdC -->
  <div class="g2" style="align-items:start">
    <div class="card">
      <div class="muted f11 f7 mb2" style="color:#E65100">📦 BdC EN ATTENTE D'OCR (${pending.length})</div>
      ${pending.length?pending.map(o=>`
        <div onclick="window._blOcrState={step:'photo',orderId:'${o.id}',photo:null,result:null};screenWarehouseBLOCR()" 
          style="padding:12px;background:#FFF3E0;border-radius:10px;margin-bottom:8px;cursor:pointer;border:2px solid transparent" 
          onmouseover="this.style.borderColor='#1565C0'" onmouseout="this.style.borderColor='transparent'">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="f7 f13">${o.sup}</div>
              <div class="muted f11 mono">${o.num} · ${o.lines} réf · ${fmt(o.total)}</div>
              <div style="font-size:11px;color:#E65100;margin-top:3px">📷 BL à photographier</div>
            </div>
            <div style="font-size:24px;color:#1565C0">→</div>
          </div>
        </div>`).join(''):'<div class="muted f12">✅ Tous les BdC ont été traités par OCR</div>'}
    </div>
    <div class="card">
      <div class="muted f11 f7 mb2" style="color:#2E7D32">✅ OCR EFFECTUÉS (${done.length})</div>
      ${done.map(o=>`<div style="padding:8px;background:#F0FFF0;border-radius:8px;margin-bottom:5px">
        <div class="f7 f12">${o.sup}</div>
        <div class="muted f11 mono">${o.num}</div>
        <div style="font-size:10px;color:#2E7D32">📄 BL: <b>${o.supplierOrderRef||'—'}</b></div>
      </div>`).join('')||'<div class="muted f12">Aucun</div>'}
    </div>
  </div>

  `:''}${_state.step==='photo'&&selOrder?`
  <!-- Étape 2: Prise de photo / upload -->
  <div class="card" style="max-width:560px;margin:0 auto">
    <div class="muted f11 f7 mb2">BdC SÉLECTIONNÉ</div>
    <div style="background:#F5F5FA;border-radius:8px;padding:10px;margin-bottom:16px">
      <div class="f7 f13">${selOrder.sup}</div>
      <div class="muted f11 mono">${selOrder.num} · ${selOrder.lines} réf · ${fmt(selOrder.total)}</div>
    </div>

    <div class="muted f11 f7 mb2">PHOTOGRAPHIER LE BON DE LIVRAISON</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <!-- Prise de photo directe (mobile) -->
      <div onclick="capturePhoto('${selOrder.id}')" style="border:2px dashed #1565C0;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#F0F7FF">
        <div style="font-size:40px">📷</div>
        <div class="f7 f12 m1">Prendre une photo</div>
        <div style="font-size:10px;color:#888">Caméra mobile · Recommandé</div>
        <input type="file" accept="image/*" capture="environment" id="cam-capture" style="display:none" onchange="handleBLPhoto('${selOrder.id}',this)">
      </div>
      <!-- Upload fichier existant -->
      <div onclick="uploadBLFile('${selOrder.id}')" style="border:2px dashed #E0E0E6;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#FAFAFA">
        <div style="font-size:40px">📁</div>
        <div class="f7 f12 m1">Importer un fichier</div>
        <div style="font-size:10px;color:#888">PDF, JPG, PNG</div>
        <input type="file" accept="image/*,application/pdf" id="file-upload-bl" style="display:none" onchange="handleBLPhoto('${selOrder.id}',this)">
      </div>
    </div>

    <div style="background:#F0F4FF;border-radius:8px;padding:10px;font-size:11px;color:#555;margin-bottom:14px">
      <b>Conseils pour une bonne photo :</b><br>
      ✓ Bon éclairage · Pas de reflet · Document à plat<br>
      ✓ Inclure le N° BL, la date et toutes les lignes articles<br>
      ✓ POST /warehouse/reception/bl-ocr → Tesseract/Google Vision → extraction auto
    </div>

    <div class="mf">
      <button class="btn bs" onclick="window._blOcrState={step:'select',orderId:null,photo:null,result:null};screenWarehouseBLOCR()">← Retour</button>
      <button class="btn bp" onclick="simulateBLOCR('${selOrder.id}')">🔬 Simuler OCR (démo)</button>
    </div>
  </div>

  `:''}${_state.step==='verify'&&selOrder&&_state.result?`
  <!-- Étape 3: Vérifier et corriger les résultats OCR -->
  <div style="max-width:680px;margin:0 auto">
    <div class="card mb2" style="border-left:3px solid #1565C0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="muted f11 f7">📷 PHOTO ANALYSÉE — ${_state.result.confidence}% DE CONFIANCE</div>
        <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${_state.result.confidence>=90?'#E8F5E9':'#FFF3E0'};color:${_state.result.confidence>=90?'#2E7D32':'#E65100'}">${_state.result.confidence>=90?'✅ Bonne qualité':'⚠️ Qualité médiocre'}</span>
      </div>
      <!-- Miniature photo simulée -->
      <div style="background:#F5F5FA;border-radius:8px;height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;border:1px solid #E0E0E6">
        <span style="font-size:36px">🖼️</span>
        <span class="muted f11" style="margin-left:8px">Photo BL ${selOrder.sup} · ${new Date().toLocaleDateString('fr-FR')}</span>
      </div>
    </div>

    <div class="card mb2">
      <div class="muted f11 f7 mb2">DONNÉES EXTRAITES — VÉRIFIEZ ET CORRIGEZ SI NÉCESSAIRE</div>
      <div class="fg">
        <div class="ff">
          <label class="fl">N° BL fournisseur <span style="color:#C62828">*</span></label>
          <input class="fi" id="ocr-blref" value="${_state.result.blRef}" style="font-family:monospace;font-weight:700" placeholder="Ex: IDLP-BL-2026-0892">
          <div style="font-size:10px;color:#888;margin-top:2px">→ Sera enregistré dans <code>supplierOrderRef</code></div>
        </div>
        <div class="ff">
          <label class="fl">Date BL</label>
          <input class="fi" id="ocr-bldate" value="${_state.result.blDate}">
        </div>
        <div class="ff">
          <label class="fl">Fournisseur détecté</label>
          <input class="fi" value="${_state.result.supplier}" readonly style="background:#F5F5FA">
        </div>
        <div class="ff">
          <label class="fl">Lignes détectées</label>
          <input class="fi" value="${_state.result.linesDetected}" readonly style="background:#F5F5FA">
        </div>
      </div>
    </div>

    <div class="card mb2">
      <div class="muted f11 f7 mb2">QUANTITÉS REÇUES — VÉRIFIEZ LIGNE PAR LIGNE</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#F5F5FA">
          <th style="padding:7px;text-align:left">SKU</th><th>Désignation</th>
          <th style="text-align:center">Commandé</th><th style="text-align:center">OCR lu</th>
          <th style="text-align:center">Confirmé ✏️</th><th style="text-align:center">Écart</th>
        </tr></thead>
        <tbody>${(selOrder.orderLines||[]).map((l,i)=>{
          const ocrQty=_state.result.quantities[i]!==undefined?_state.result.quantities[i]:l.qtyOrdered;
          const diff=ocrQty-l.qtyOrdered;
          return `<tr style="border-bottom:1px solid #F5F5FA">
            <td style="padding:5px;font-family:monospace;font-size:10px">${l.sku}</td>
            <td style="padding:5px">${ell(l.n,20)}</td>
            <td style="padding:5px;text-align:center;color:#888">${l.qtyOrdered}</td>
            <td style="padding:5px;text-align:center;font-weight:700;color:${diff===0?'#2E7D32':diff<0?'#C62828':'#E65100'}">${ocrQty}</td>
            <td style="padding:3px"><input type="number" min="0" value="${ocrQty}" id="blqty-${i}" style="width:65px;padding:4px;border:1px solid #E0E0E6;border-radius:5px;text-align:center;font-size:12px" onchange="checkBLDiff(${i},${l.qtyOrdered})"></td>
            <td style="padding:5px;text-align:center;font-weight:700;color:${diff===0?'#2E7D32':diff<0?'#C62828':'#E65100'}" id="diff-${i}">${diff===0?'✓':diff>0?'+'+(diff):(diff)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      <div id="diff-warning" style="margin-top:8px;font-size:11px;color:#E65100;display:none">
        ⚠️ Des écarts ont été détectés — Vérifiez avec le bon physique avant de valider
      </div>
    </div>

    <div class="mf">
      <button class="btn bs" onclick="window._blOcrState={step:'photo',orderId:'${selOrder.id}',photo:null,result:null};screenWarehouseBLOCR()">📷 Refaire la photo</button>
      <button class="btn bp" onclick="validateBLOCR('${selOrder.id}')">✅ Valider — Appliquer à la réception</button>
    </div>
  </div>

  `:''}${_state.step==='done'?`
  <!-- Étape 4: Confirmation -->
  <div style="text-align:center;padding:40px 20px">
    <div style="font-size:64px;margin-bottom:16px">✅</div>
    <div class="f7 f14 mb2">OCR BL appliqué avec succès</div>
    <div class="muted f12 mb3">supplierOrderRef et quantités pré-remplies — La fiche de réception est prête</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn bp" onclick="window._blOcrState={step:'select',orderId:null,photo:null,result:null};screenWarehouseBLOCR()">📷 Nouveau BL</button>
      <button class="btn bs" onclick="navigate('/warehouse/reception')">📥 Retour Réception</button>
    </div>
  </div>
  `:''}
  `);
}
function capturePhoto(orderId){const el=Q('cam-capture');if(el){el.click();}else{simulateBLOCR(orderId);}}
function uploadBLFile(orderId){const el=Q('file-upload-bl');if(el){el.click();}else{simulateBLOCR(orderId);}}
function handleBLPhoto(orderId,input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  toast('Photo reçue → Analyse OCR en cours...');
  setTimeout(()=>simulateBLOCR(orderId),800);
}
function simulateBLOCR(orderId){
  const o=SUP_ORDERS.find(x=>x.id===orderId);if(!o)return;
  const blRef=o.supplierOrderRef||o.sup.slice(0,4).toUpperCase()+'-BL-2026-'+Math.floor(1000+Math.random()*8999);
  const quantities=(o.orderLines||[]).map(l=>{
    // OCR may misread occasionally — simulate ~90% accuracy
    const err=Math.random()<0.15?-1:0;
    return Math.max(0,l.qtyOrdered+err);
  });
  const confidence=Math.floor(88+Math.random()*10);
  window._blOcrState={step:'verify',orderId,photo:'simulated',result:{
    blRef,blDate:'28/02/2026',supplier:o.sup,
    linesDetected:o.orderLines?o.orderLines.length:o.lines,
    quantities,confidence
  }};
  toast('OCR terminé — '+confidence+'% de confiance · '+quantities.length+' lignes');
  screenWarehouseBLOCR();
}
function checkBLDiff(idx,ordered){
  const el=Q('blqty-'+idx);const diffEl=Q('diff-'+idx);
  if(!el||!diffEl)return;
  const val=parseInt(el.value)||0;
  const diff=val-ordered;
  diffEl.textContent=diff===0?'✓':diff>0?'+'+diff:''+diff;
  diffEl.style.color=diff===0?'#2E7D32':diff<0?'#C62828':'#E65100';
  const w=Q('diff-warning');if(w){
    const anyDiff=document.querySelectorAll('[id^="blqty-"]');
    let hasDiff=false;
    anyDiff.forEach((inp,i)=>{
      const o2=parseInt(inp.value)||0;
      // we'd need original ordered qty here — simplified
      if(inp.getAttribute('data-ordered')&&o2!==parseInt(inp.getAttribute('data-ordered')))hasDiff=true;
    });
    w.style.display=diff!==0?'block':'none';
  }
}
function validateBLOCR(orderId){
  const o=SUP_ORDERS.find(x=>x.id===orderId);if(!o)return;
  const r=window._blOcrState&&window._blOcrState.result;if(!r)return;
  const blRef=(Q('ocr-blref')||{value:r.blRef}).value||r.blRef;
  // Update quantities from confirmed fields
  const updatedLines=(o.orderLines||[]).map((l,i)=>{
    const el=Q('blqty-'+i);
    const qty=el?parseInt(el.value)||l.qtyOrdered:r.quantities[i]||l.qtyOrdered;
    return {...l,qtyReceived:qty};
  });
  SUP_ORDERS=SUP_ORDERS.map(x=>x.id===orderId?{...x,supplierOrderRef:blRef,blOcrDone:true,orderLines:updatedLines}:x);
  window._blOcrState={step:'done',orderId,photo:null,result:null};
  beepOK();
  toast('BL OCR validé — '+blRef+' · supplierOrderRef enregistré · Quantités pré-remplies');
  screenWarehouseBLOCR();
}

// ═══ INIT ════════════════════════════════════════════════════
initLogin();
</script>
</body>
